<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Mother's Day 💐</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a3d91, #d4af37);
    text-align: center;
    color: #fff;
    overflow-x: hidden;
}

/* TITLE */
h1 {
    margin-top: 25px;
    font-size: 2.6em;
    text-shadow: 0 0 20px gold;
    line-height: 1.4;
}

/* BUTTON */
button {
    padding: 12px 18px;
    border: none;
    border-radius: 25px;
    background: gold;
    color: #0a3d91;
    font-size: 16px;
    cursor: pointer;
    margin: 8px;
    font-weight: bold;
}

/* CIRCLE SLIDESHOW */
.slideshow {
    margin: 25px auto;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    overflow: hidden;
    border: 6px solid gold;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
}

.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 💎 GLASS GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

.glass-card {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    overflow: hidden;
    transition: transform 0.3s ease;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.glass-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.glass-card:hover {
    transform: scale(1.05);
}

/* POPUP */
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: linear-gradient(135deg, gold, #0a3d91);
    padding: 25px;
    width: 80%;
    max-width: 500px;
    border-radius: 15px;
    box-shadow: 0 0 25px gold;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}

/* TEXT */
#typeText {
    min-height: 150px;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0.8;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
}

/* FOOTER */
footer {
    margin-top: 40px;
    padding: 15px;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid gold;
    font-size: 14px;
}

footer a {
    color: gold;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>💐 Happy Mother's Day 💐<br>Angela Mariae Okoli</h1>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="Havfy_-_Happy_International_Mothers_Day_Spoken_Word_Poem__CeeNaija.com_.mp3" type="audio">
</audio>

<button onclick="toggleMusic()">▶ Play / Pause Music</button>

<!-- 🖼️ MAIN SLIDESHOW -->
<div class="slideshow">
    <img src="Angela 5.jpg">
</div>

<!-- 💎 GLASS IMAGE GALLERY -->
<h2>💖 Memories Gallery</h2>

<div class="gallery">
    <div class="glass-card"><img src="Angela Maria Okoli.png"></div>
    <div class="glass-card"><img src="Angela Maria 2.png"></div>
    <div class="glass-card"><img src="Angela 9.jpg"></div>
    <div class="glass-card"><img src="Angela Maria.png"></div>
</div>

<!-- 💌 BUTTON -->
<button onclick="openPopup()">💌 Open Heart Message</button>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">✖</span>
        <h2>To Our Beautiful Mother 💖</h2>
        <div id="typeText"></div>
    </div>
</div>

<script>

// 🎵 MUSIC
let music = document.getElementById("bgMusic");

function toggleMusic() {
    if (music.paused) music.play();
    else music.pause();
}

// 🖼️ SLIDESHOW
let images = [
 "Angela 1.jpg",
 "Angela 5.jpg",
 "Angela 4.jpg"
];

let i = 0;
document.getElementById("slide").src = images[0];

setInterval(() => {
    i = (i + 1) % images.length;
    document.getElementById("slide").src = images[i];
}, 3000);

// 💌 MESSAGE
function openPopup() {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("typeText").innerHTML = "";

    let message =
    `Dear Angela Mariae Okoli 💖\n\n` +
    `You are the heart of our home.\n\n` +
    `Your love is endless, your care is priceless.\n\n` +
    `We are forever grateful for you.\n\n` +
    `Happy Mother’s Day 💐❤️`;

    let t = 0;

    function typeWriter() {
        if (t < message.length) {
            document.getElementById("typeText").innerHTML += message.charAt(t);
            t++;
            setTimeout(typeWriter, 30);
        }
    }

    typeWriter();
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// 💖 HEARTS
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    const icons = ["💖","💛","💙","❤️","💕"];
    heart.innerText = icons[Math.floor(Math.random() * icons.length)];

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 4 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 7000);
}

setInterval(createHeart, 300);

</script>

<footer>
    © 2026 @SJCMSCHOOL | 
    <a href="https://sjcmschool.online" target="_blank">sjcmschool.online</a>
</footer>

</body>
</html>
